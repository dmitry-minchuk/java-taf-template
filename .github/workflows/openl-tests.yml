name: OpenL Tests

on:
  workflow_dispatch:
    inputs:
      application_version:
        description: "OpenL Docker image tag"
        required: true
        default: "x"
      tests_branch:
        description: "Autotests branch label for reporting"
        required: true
        default: "main"

jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        suite:
          - studio_issues
          - studio_smoke
          - studio_rules_editor
          - studio_git
          - studio_api_integration
          - service_smoke
          - studio_open_api

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run suite
        env:
          GIT_TOKEN_RULESERVICE: ${{ secrets.GIT_TOKEN_RULESERVICE }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
          BUILD_LABEL: ${{ inputs.application_version }}
          TESTS_BRANCH: ${{ inputs.tests_branch }}
        run: |
          mvn clean test \
            -Drp.enable=false \
            -Dlog4j.configurationFile=src/test/resources/log4j2-gha.xml \
            -Dexecution.mode=PLAYWRIGHT_DOCKER \
            -Djava.net.preferIPv4Stack=true \
            -Dsuite=${{ matrix.suite }} \
            -Ddocker_image_name=ghcr.io/openl-tablets/webstudio:${{ inputs.application_version }} \
            -Dws_docker_image_name=ghcr.io/openl-tablets/ws:${{ inputs.application_version }}-all \
            -Dgit.token.ruleservice="${GIT_TOKEN_RULESERVICE}" \
            -Dgit.password="${GIT_PASSWORD}" \
            -Drp.project=OpenL_Tests \
            -Drp.launch=${{ matrix.suite }} \
            -Drp.attributes="build:${BUILD_LABEL};tests_branch:${TESTS_BRANCH};github_run_id:${GITHUB_RUN_ID}" \
            -Drp.export.dir=target/rp-export

      - name: Fail on failed TestNG results
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ] && grep -Eq 'failed="[1-9]|skipped="[1-9]' target/surefire-reports/testng-results.xml; then
            echo "TestNG reported failed or skipped tests"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openl-tests-${{ matrix.suite }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            target/rp-export/**
            target/surefire-reports/**
            target/screenshots/**
            target/videos/**
            target/logs/**
            target/downloads/**
