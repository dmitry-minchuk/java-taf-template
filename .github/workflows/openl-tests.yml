name: OpenL Tests

on:
  workflow_dispatch:
    inputs:
      application_version:
        description: "OpenL Docker image tag"
        required: true
        default: "x"
      tests_branch:
        description: "Autotests branch label for reporting"
        required: true
        default: "main"
      rp_launch_name:
        description: "ReportPortal launch name"
        required: true
        default: "webstudio_tests"

env:
  RP_LAUNCH_NAME: ${{ inputs.rp_launch_name }}

jobs:
  discover-tests:
    name: Discover test shards
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Generate test matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/github-actions/generate-test-matrix.py --max-shard-size 8)"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"
          echo "${MATRIX}"

  test-shard:
    name: ${{ matrix.display }}
    needs: discover-tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover-tests.outputs.matrix) }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Generate TestNG shard suite
        run: |
          python3 scripts/github-actions/generate-testng-suite.py \
            --classes "${{ matrix.classes }}" \
            --output "generated-testng/${{ matrix.display }}.xml" \
            --suite-name "OpenL GHA ${{ matrix.display }}"

      - name: Run shard
        env:
          GIT_TOKEN_RULESERVICE: ${{ secrets.GIT_TOKEN_RULESERVICE }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
          BUILD_LABEL: ${{ inputs.application_version }}
          TESTS_BRANCH: ${{ inputs.tests_branch }}
          STUDIO_IMAGE_KIND: ${{ matrix.studio_image_kind }}
          WS_IMAGE_KIND: ${{ matrix.ws_image_kind }}
          APPLICATION_VERSION: ${{ inputs.application_version }}
        run: |
          resolve_image() {
            case "$1" in
              webstudio) echo "ghcr.io/openl-tablets/webstudio:${APPLICATION_VERSION}" ;;
              ws)        echo "ghcr.io/openl-tablets/ws:${APPLICATION_VERSION}-all" ;;
              *) echo "Unknown image kind: $1" >&2; exit 1 ;;
            esac
          }
          STUDIO_IMAGE="$(resolve_image "${STUDIO_IMAGE_KIND}")"
          WS_IMAGE="$(resolve_image "${WS_IMAGE_KIND}")"
          echo "Using docker_image_name=${STUDIO_IMAGE}"
          echo "Using ws_docker_image_name=${WS_IMAGE}"

          mvn clean test \
            -Drp.enable=false \
            -Dlog4j.configurationFile=src/test/resources/log4j2-gha.xml \
            -Dexecution.mode=PLAYWRIGHT_DOCKER \
            -Djava.net.preferIPv4Stack=true \
            -DsuiteXmlFile=generated-testng/${{ matrix.display }}.xml \
            -Ddocker_image_name="${STUDIO_IMAGE}" \
            -Dws_docker_image_name="${WS_IMAGE}" \
            -Dplaywright_default_timeout=20000 \
            -Dapp_container_startup_timeout_minutes=10 \
            -Dgit.token.ruleservice="${GIT_TOKEN_RULESERVICE}" \
            -Dgit.password="${GIT_PASSWORD}" \
            -Drp.project=OpenL_Tests \
            -Drp.launch="${RP_LAUNCH_NAME}" \
            -Drp.attributes="build:${BUILD_LABEL};tests_branch:${TESTS_BRANCH};github_run_id:${GITHUB_RUN_ID}" \
            -Drp.export.dir=target/rp-export

      - name: Fail on failed TestNG results
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ] && grep -Eq 'failed="[1-9]|skipped="[1-9]' target/surefire-reports/testng-results.xml; then
            echo "TestNG reported failed or skipped tests"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openl-tests-${{ matrix.display }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            target/rp-export/**
            target/surefire-reports/**
            target/screenshots/**
            target/videos/**
            target/logs/**
            target/downloads/**
            generated-testng/**

  studio-git-remote:
    name: studio_git_remote
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Generate remote Git TestNG suite
        run: |
          python3 scripts/github-actions/generate-testng-suite.py \
            --classes "tests.ui.webstudio.git.TestGitSwitchToDeletedBranch,tests.ui.webstudio.git.TestGitSwitchDeletedBranchPreset" \
            --output "generated-testng/studio_git_remote.xml" \
            --suite-name "OpenL GHA studio_git_remote"

      - name: Run remote Git tests sequentially
        env:
          GIT_TOKEN_RULESERVICE: ${{ secrets.GIT_TOKEN_RULESERVICE }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
          BUILD_LABEL: ${{ inputs.application_version }}
          TESTS_BRANCH: ${{ inputs.tests_branch }}
        run: |
          # Remote git tests live in the studio_git suite, which uses
          # (webstudio, webstudio) per Jenkinsfile's functionalJobList.
          STUDIO_IMAGE="ghcr.io/openl-tablets/webstudio:${{ inputs.application_version }}"
          WS_IMAGE="${STUDIO_IMAGE}"

          mvn clean test \
            -Drp.enable=false \
            -Dlog4j.configurationFile=src/test/resources/log4j2-gha.xml \
            -Dexecution.mode=PLAYWRIGHT_DOCKER \
            -Djava.net.preferIPv4Stack=true \
            -DsuiteXmlFile=generated-testng/studio_git_remote.xml \
            -Ddocker_image_name="${STUDIO_IMAGE}" \
            -Dws_docker_image_name="${WS_IMAGE}" \
            -Dplaywright_default_timeout=20000 \
            -Dapp_container_startup_timeout_minutes=10 \
            -Dgit.token.ruleservice="${GIT_TOKEN_RULESERVICE}" \
            -Dgit.password="${GIT_PASSWORD}" \
            -Drp.project=OpenL_Tests \
            -Drp.launch="${RP_LAUNCH_NAME}" \
            -Drp.attributes="build:${BUILD_LABEL};tests_branch:${TESTS_BRANCH};github_run_id:${GITHUB_RUN_ID}" \
            -Drp.export.dir=target/rp-export

      - name: Fail on failed TestNG results
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ] && grep -Eq 'failed="[1-9]|skipped="[1-9]' target/surefire-reports/testng-results.xml; then
            echo "TestNG reported failed or skipped tests"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openl-tests-studio_git_remote
          if-no-files-found: ignore
          retention-days: 14
          path: |
            target/rp-export/**
            target/surefire-reports/**
            target/screenshots/**
            target/videos/**
            target/logs/**
            target/downloads/**
            generated-testng/**

  merge-reportportal-export:
    name: Merge ReportPortal export
    needs:
      - test-shard
      - studio-git-remote
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openl-tests-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Merge ReportPortal exports
        run: |
          python3 scripts/github-actions/merge-rp-exports.py \
            --input-root downloaded-artifacts \
            --output-dir merged-rp-export \
            --launch-name "${RP_LAUNCH_NAME}"

      - name: Upload merged ReportPortal export
        uses: actions/upload-artifact@v4
        with:
          name: rp-export-merged
          if-no-files-found: error
          retention-days: 14
          path: merged-rp-export/**
